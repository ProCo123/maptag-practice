<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapTag Practice</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100vh;
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: auto;
        }
        .modal.hidden {
            display: none;
        }
        .modal-content {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }
        .modal-content h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .modal-content p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .modal-section {
            margin-bottom: 30px;
        }
        .modal-section h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #fff;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: 2px solid rgba(100, 150, 255, 0.5);
            background: rgba(100, 150, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.8);
        }
        .btn.active {
            background: rgba(100, 150, 255, 0.8);
            border-color: rgba(100, 150, 255, 1);
        }
        .btn.start {
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn.start:hover {
            opacity: 0.9;
        }
        .top-bar {
            padding: 20px;
            background: rgba(10, 14, 39, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            z-index: 10;
        }
        .question {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .progress {
            font-size: 14px;
            color: #aaa;
        }
        .result {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            pointer-events: auto;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
            min-width: 300px;
            animation: slideIn 0.3s ease-out;
        }
        .result.show {
            display: block;
        }
        @keyframes slideIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        .result.correct {
            border-color: rgba(100, 200, 150, 0.8);
        }
        .result.incorrect {
            border-color: rgba(255, 100, 100, 0.8);
        }
        .result h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .result p {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 20px;
        }
        .result button {
            padding: 12px 32px;
            background: rgba(100, 150, 255, 0.6);
            border: none;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.9);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            z-index: 10;
            font-size: 13px;
            line-height: 1.8;
        }
        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(100, 150, 255, 0.2);
            border: 2px solid rgba(100, 150, 255, 0.5);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            pointer-events: auto;
            z-index: 10;
        }
        .reset-btn:hover {
            background: rgba(100, 150, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="modal" id="startModal">
        <div class="modal-content">
            <h1>🌍 MapTag Practice</h1>
            <p>Master world geography one country at a time</p>
            
            <div class="modal-section">
                <h2>Choose Mode</h2>
                <div class="button-group">
                    <button class="btn active" id="beginnerBtn" onclick="selectMode('beginner')">Beginner</button>
                    <button class="btn" id="hardBtn" onclick="selectMode('hard')">Hard</button>
                </div>
            </div>

            <div class="modal-section" id="continentSection">
                <h2>Choose Continent</h2>
                <div class="button-group" id="continentButtons"></div>
            </div>

            <button class="btn start" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div class="ui-overlay">
        <div class="top-bar">
            <div class="question" id="question">Loading...</div>
            <div class="progress" id="progress">0 / 0</div>
        </div>
    </div>

    <div class="result" id="result">
        <h2 id="resultTitle">Correct!</h2>
        <p id="resultMessage"></p>
        <button onclick="nextQuestion()">Next Country</button>
    </div>

    <div class="stats" id="stats"></div>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>

    <script src="app.js"></script>
</body>
</html>
